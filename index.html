ht=\"11\" viewBox=\"0 0 12 12\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n              <path d=\"M2 6.5L4.5 9L10 3\" stroke=\"#3D0919\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n            <\u002Fsvg>\n            需要提交的作业\n          <\u002Fspan>\n        <\u002Fdiv>\n        <ul class=\"items\">\n          <li>文献综述大纲<\u002Fli>\n          <li>文献阅读笔记<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"section\">\n        <div class=\"section-header\">\n          <span class=\"section-tag focus\">\n            <svg width=\"11\" height=\"11\" viewBox=\"0 0 12 12\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n              <circle cx=\"6\" cy=\"6\" r=\"4.2\" stroke=\"#FFC627\" stroke-width=\"1.4\"><\u002Fcircle>\n              <circle cx=\"6\" cy=\"6\" r=\"1.2\" fill=\"#FFC627\"><\u002Fcircle>\n            <\u002Fsvg>\n            重点\n          <\u002Fspan>\n        <\u002Fdiv>\n        <ul class=\"items focus\">\n          <li spellcheck=\"false\" style=\"\">查看任课教师对\"说出你的故事\"的反馈，并进一步扩展阅读<\u002Fli>\n          <li style=\"\" spellcheck=\"false\">继续根据心理学关键词来扩展搜索，积累学术文献阅读<\u002Fli>\n          <li>预约与任课教师的视频讨论<\u002Fli>\n          <li style=\"\">考虑是否在组会上进行报告<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Phase 3 -->\n    <section class=\"phase\">\n      <span class=\"arrow-tip\"><\u002Fspan>\n      <span class=\"arrow-down-mobile\"><\u002Fspan>\n      <div class=\"phase-number-row\">\n        <span class=\"phase-num\">PHASE 03<\u002Fspan>\n        <span class=\"phase-pill\">Develop<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"phase-name\">第三周至第五周<\u002Fdiv>\n      <div class=\"phase-week\">Weeks 3 – 5 · 深度研读与撰写<\u002Fdiv>\n      <div class=\"phase-divider\"><\u002Fdiv>\n\n      <div class=\"section\">\n        <div class=\"section-header\">\n          <span class=\"section-tag submit\">\n            <svg width=\"11\" height=\"11\" viewBox=\"0 0 12 12\"
